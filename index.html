<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🔍 SEARCH -->
<div class="hero">
    <div class="search-bar">
        <input type="text" placeholder="Search city..." spellcheck="false">
        <button id="searchBtn">Search</button>
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <!-- LEFT WEATHER -->
    <div class="weather-card">
        <img src="clear.png" class="weather-icon">

        <h1 class="temp">--°C</h1>
        <h2 class="city">City</h2>

        <div class="details">
            <div class="col">
                <p class="humidity">--%</p>
                <p>Humidity</p>
            </div>

            <div class="col">
                <p class="wind">-- km/h</p>
                <p>Wind</p>
            </div>
        </div>
    </div>

    <!-- RIGHT CHARACTER -->
    <div class="character-box">
        <div class="boy">

            <div class="head"></div>
            <div class="body"></div>

            <div class="sunglasses hidden" id="sunglasses"></div>
            <div class="umbrella hidden" id="umbrella"></div>

        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
